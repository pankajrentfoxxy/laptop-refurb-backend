# Dual-domain: crm.rentfoxxy.com + erp.rentfoxxy.com
# Used by Dockerfile.web.deploy (Hostinger /docker/laptop-erp)

# HTTP - CRM (ACME + redirect to HTTPS)
server {
    listen 80;
    server_name crm.rentfoxxy.com 187.77.187.213;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTP - ERP (ACME + redirect to HTTPS)
server {
    listen 80;
    server_name erp.rentfoxxy.com;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - CRM
server {
    listen 443 ssl http2;
    server_name crm.rentfoxxy.com 187.77.187.213;

    ssl_certificate /etc/letsencrypt/live/crm.rentfoxxy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.rentfoxxy.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://laptop-erp-backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering on;
        proxy_buffer_size 4k;
    }

    client_max_body_size 20M;
}

# HTTPS - ERP (proxy to rentfoxxy_erp container)
server {
    listen 443 ssl http2;
    server_name erp.rentfoxxy.com;

    ssl_certificate /etc/letsencrypt/live/erp.rentfoxxy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.rentfoxxy.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    location / {
        proxy_pass http://rentfoxxy-erp-web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    client_max_body_size 20M;
}
