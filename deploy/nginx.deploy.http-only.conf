# HTTP-only fallback when SSL certs are not yet available
# Used when /etc/letsencrypt/live/crm.rentfoxxy.com/ does not exist
server {
    listen 80;
    server_name crm.rentfoxxy.com 187.77.187.213 _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://laptop-erp-backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering on;
        proxy_buffer_size 4k;
    }

    client_max_body_size 20M;
}
